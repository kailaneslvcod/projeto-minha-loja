<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Kat Candy - Ovos de Páscoa</title>
</head>
<body>
    <header>
       <h1>Kat Candy</h1>
       <p>Ovos de Colher Artesanais</p>
    </header>
 
    <main>
        <section class="produtos">
            <div class="card">
                <img src="https://i.pinimg.com/736x/72/2e/0b/722e0b6e6743c899d92dfb673f2f9de4.jpg" alt="Ferrero Rocher">
                <h2>Ferrero Rocher</h2>
                <p>Ovo de colher sabor Ferrero Rocher 300g</p>
                <span class="preco">R$ 29,90</span>
                <button class="btn-comprar">Comprar</button>
            </div>
            <div class="card">
                <img src="https://i.pinimg.com/736x/fd/11/3b/fd113b0e11e423e9c6df9f162b37288a.jpg" alt="Ninho com Nutella">
                <h2>Ninho com Nutella</h2>
                <p>Ovo de colher sabor Ninho com Nutella 500g</p>
                <span class="preco">R$ 49,90</span>
                <button class="btn-comprar">Comprar</button>
            </div>
            <div class="card">
                <img src="https://i.pinimg.com/736x/87/cd/5b/87cd5baba1cd2d319ca73ed6268f141b.jpg" alt="BomBom de Morango">
                <h2>BomBom de Morango</h2>
                <p>Ovo de colher sabor BomBom de Morango 500g</p>
                <span class="preco">R$ 55,00</span>
                <button class="btn-comprar">Comprar</button>
            </div>
        </section>

    <footer>&copy; 2026 - Kat Candy</footer>

    <script src="script.js"></script>
